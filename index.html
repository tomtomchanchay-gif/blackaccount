<script type="text/app" id="appcode">
const { useState, useEffect, useRef } = React;

  try { sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY); }
  catch (e) { console.error("Supabase init failed:", e); }

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function nowISO(){ return new Date().toISOString(); }

const LOCAL_KEY = "pordaiyat_local_v1";
function localGet(){ try{ return JSON.parse(localStorage.getItem(LOCAL_KEY) || "null"); }catch(e){ return null; } }
function localSet(v){ try{ localStorage.setItem(LOCAL_KEY, JSON.stringify(v)); }catch(e){} }

/* ===== ฐานข้อมูล: เคส / ไทม์ไลน์ / เอกสาร / การจองคิว ===== */
const db = {
  async listCases(){
    if (sb && currentUser){
      const { data, error } = await sb.from("cases").select("*").eq("user_id", currentUser.id).order("created_at",{ascending:false});
      if (error) { console.error(error); return []; }
      return data || [];
    }
    const local = localGet();
    return (local && local.cases) || [];
  },
  async insertCase(c){
    const row = { ...c, id: uid(), created_at: nowISO() };
    if (sb && currentUser){
      row.user_id = currentUser.id;
      const { data, error } = await sb.from("cases").insert(row).select().single();
      if (error){ console.error(error); return row; }
      return data;
    }
    const local = localGet() || { cases:[], events:[], docs:[] };
    local.cases = [row, ...(local.cases||[])];
    localSet(local);
    return row;
  },
  async listEvents(caseId){
    if (sb && currentUser){
      const { data, error } = await sb.from("timeline_events").select("*").eq("case_id", caseId).order("event_time",{ascending:true});
      if (error){ console.error(error); return []; }
      return data || [];
    }
    const local = localGet();
    return ((local && local.events) || []).filter(e=>e.case_id===caseId);
  },
  async insertEvent(caseId, text){
    const row = { id: uid(), case_id: caseId, event_text: text, event_time: nowISO() };
    if (sb && currentUser){
      row.user_id = currentUser.id;
      const { data, error } = await sb.from("timeline_events").insert(row).select().single();
      if (error){ console.error(error); return row; }
      return data;
    }
    const local = localGet() || { cases:[], events:[], docs:[] };
    local.events = [...(local.events||[]), row];
    localSet(local);
    return row;
  },
  async listDocs(){
    if (sb && currentUser){
      const { data, error } = await sb.from("documents").select("*").eq("user_id", currentUser.id).order("created_at",{ascending:false});
      if (error){ console.error(error); return []; }
      return data || [];
    }
    const local = localGet();
    return (local && local.docs) || [];
  },
  async insertDoc(file){
    const row = { id: uid(), file_name: file.name, file_size: file.size, created_at: nowISO() };
    if (sb && currentUser){
      row.user_id = currentUser.id;
      const path = currentUser.id + "/" + Date.now() + "-" + file.name;
      const { error: upErr } = await sb.storage.from("documents").upload(path, file);
      if (!upErr) row.storage_path = path;
      const { data, error } = await sb.from("documents").insert(row).select().single();
      if (error){ console.error(error); return row; }
      return data;
    }
    const local = localGet() || { cases:[], events:[], docs:[] };
    local.docs = [row, ...(local.docs||[])];
    localSet(local);
    return row;
  },
  async insertBooking(b){
    const row = { ...b, id: uid(), created_at: nowISO() };
    if (sb){
      row.user_id = currentUser ? currentUser.id : null;
      const { data, error } = await sb.from("bookings").insert(row).select().single();
      if (error){ console.error(error); return row; }
      return data;
    }
    const local = localGet() || { cases:[], events:[], docs:[], bookings:[] };
    local.bookings = [row, ...(local.bookings||[])];
    localSet(local);
    return row;
  }
};

/* ===== App หลัก (หลัง login หรือโหมด local) ===== */
function App({ session }){
  const [view, setView] = useState("home");
  const [cases, setCases] = useState([]);
  const [docs, setDocs] = useState([]);
  const [events, setEvents] = useState([]);
  const [uploading, setUploading] = useState(false);

  const refreshCases = async () => { setCases(await db.listCases()); };
  const refreshDocs = async () => { setDocs(await db.listDocs()); };
  const activeCase = cases && cases.length ? cases[0] : null;
  const refreshEvents = async () => { if(activeCase) setEvents(await db.listEvents(activeCase.id)); };

  useEffect(()=>{ refreshCases(); refreshDocs(); }, []);
  useEffect(()=>{ refreshEvents(); }, [activeCase && activeCase.id]);

  const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    const row = await db.insertDoc(file);
    setDocs(prev=>[row, ...prev]);
    setUploading(false);
  };
  const handleAddEvent = async (text) => {
    const row = await db.insertEvent(activeCase.id, text);
    setEvents(prev=>[...prev, row]);
  };

  return React.createElement(React.Fragment, null,
    React.createElement(TopNav, {view, setView, session}),
    React.createElement("button",{id:"sos-btn", onClick:()=>setView("help")},
      React.createElement("i",{className:"ti ti-headset"}), "ขอความช่วยเหลือด่วน"),
    React.createElement("div",{className:"wrap"},
      React.createElement("div",{className:"page"},
        view==="home" && React.createElement(HomePage, {setView, session, refreshCases}),
        view==="dashboard" && React.createElement(DashboardPage, {session, cases, docs, events, setView}),
        view==="documents" && React.createElement(DocumentsPage, {docs, onUpload:handleUpload, uploading}),
        view==="timeline" && React.createElement(TimelinePage, {activeCase, events, onAdd:handleAddEvent}),
        view==="knowledge" && React.createElement(KnowledgePage, null),
        view==="help" && React.createElement(HelpPage, null)
      ))
  );
}

/* ===== Gate: เช็ค session ก่อน render (ถ้าต่อ Supabase ไว้) ===== */
function Gate(){
  const [ready, setReady] = useState(!USE_SUPABASE);
  const [session, setSession] = useState(null);
  useEffect(()=>{
    if (!USE_SUPABASE) return;
    sb.auth.getSession().then(({data})=>{
      currentUser = data.session ? data.session.user : null;
      setSession(data.session);
      setReady(true);
    });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s)=>{
      currentUser = s ? s.user : null;
      setSession(s);
    });
    return ()=>{ try{ sub.subscription.unsubscribe(); }catch(e){} };
  }, []);
  if (!ready) return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-secondary)"}}, "กำลังโหลด...");
  if (USE_SUPABASE && !session) return React.createElement(LoginScreen, null);
  return React.createElement(App, {key: session && session.user ? session.user.id : "local", session});
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Gate, null));
} catch (err) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#b91c1c">เกิดข้อผิดพลาดในการแสดงผล: ' + (err && err.message) + '</div>';
}
</script>

<script>
(function(){
  function loadOne(urls, test, done){
    if(test()) return done();
    var i=0;
    (function go(){
      if(i>=urls.length) return done();
      var s=document.createElement('script');
      s.src=urls[i++];
      s.onload=function(){ test()?done():go(); };
      s.onerror=go;
      document.head.appendChild(s);
    })();
  }
  function chain(steps, fin){ var i=0; (function nx(){ if(i>=steps.length) return fin(); steps[i++](nx); })(); }
  var rootEl=document.getElementById('root');
  chain([
    function(n){ loadOne([
      'https://unpkg.com/react@18/umd/react.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
      'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'
    ], function(){return !!window.React;}, n); },
    function(n){ loadOne([
      'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
      'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'
    ], function(){return !!window.ReactDOM;}, n); },
    function(n){ loadOne([
      'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
      'https://unpkg.com/@supabase/supabase-js@2'
    ], function(){return !!window.supabase;}, n); }
  ], function(){
    if(!window.React || !window.ReactDOM){
      if(rootEl) rootEl.innerHTML='<div style="padding:40px;text-align:center;color:#b91c1c">โหลดไลบรารีหลักไม่สำเร็จ กรุณาเช็คอินเทอร์เน็ตแล้วรีเฟรช</div>';
      return;
    }
    try {
      var code=document.getElementById('appcode').textContent;
      (0, eval)(code);
    } catch(e){
      if(rootEl) rootEl.innerHTML='<div style="padding:40px;font-family:sans-serif;color:#b91c1c">เริ่มระบบไม่สำเร็จ: '+(e&&e.message)+'</div>';
    }
  });
})();
</script>
</body>
</html>
