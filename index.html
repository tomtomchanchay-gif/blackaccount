<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ปลดอายัติ.com</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo:#4A3AFF;--indigo-deep:#2E1F8C;--gold:#F2A93B;--coral:#FF6F59;
    --bg:#FAF7F2;--surface:rgba(255,255,255,0.7);--surface-solid:#FFFFFF;
    --border:rgba(46,31,76,0.09);--border-strong:rgba(46,31,76,0.18);
    --text-primary:#211A3D;--text-secondary:#655D82;--text-muted:#9590AD;
    --radius:16px;--radius-sm:11px;
    --font:"Noto Sans Thai","Inter",-apple-system,sans-serif;--font-mono:"IBM Plex Mono",monospace;
  }
  :root[data-theme="dark"]{
    --indigo:#7C6CFF;--indigo-deep:#5B4BFF;--gold:#F2B95B;--coral:#FF8770;
    --bg:#0F0D1A;--surface:rgba(255,255,255,0.05);--surface-solid:#181527;
    --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.16);
    --text-primary:#F1EEFB;--text-secondary:#B7AFD6;--text-muted:#7E7699;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);font-family:var(--font);color:var(--text-primary);min-height:100vh;overflow-x:hidden;position:relative;transition:background .35s ease,color .35s ease;}
  #bgfx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  #bgfx::before{content:'';position:absolute;top:-20%;right:-10%;width:60%;height:60%;border-radius:50%;background:radial-gradient(circle,rgba(74,58,255,0.10),transparent 70%);filter:blur(40px);animation:driftA 18s ease-in-out infinite;}
  #bgfx::after{content:'';position:absolute;bottom:-15%;left:-10%;width:55%;height:55%;border-radius:50%;background:radial-gradient(circle,rgba(242,169,59,0.12),transparent 70%);filter:blur(40px);animation:driftB 22s ease-in-out infinite;}
  @keyframes driftA{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-30px,40px) scale(1.08);}}
  @keyframes driftB{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,-30px) scale(1.1);}}
  :root[data-theme="dark"] #bgfx::before{background:radial-gradient(circle,rgba(124,108,255,0.16),transparent 70%);}
  :root[data-theme="dark"] #bgfx::after{background:radial-gradient(circle,rgba(242,185,91,0.10),transparent 70%);}
  .wrap{position:relative;z-index:2;}
  #topnav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:rgba(250,247,242,0.85);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
  #topnav .brand{display:flex;align-items:center;gap:11px;cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
  #topnav .brand:hover{transform:scale(1.04);}
  #topnav .brand:hover svg{filter:drop-shadow(0 4px 10px rgba(74,58,255,0.4));}
  #topnav .brand span{font-size:18px;font-weight:800;color:var(--text-primary);}
  .navlinks{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
  .navlinks button{background:transparent;border:none;color:var(--text-secondary);font-family:var(--font);font-size:13.5px;font-weight:600;padding:9px 15px;border-radius:var(--radius-sm);cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);position:relative;}
  .navlinks button:hover{background:rgba(46,31,76,0.05);color:var(--text-primary);transform:translateY(-2px);}
  .navlinks button.active{background:rgba(74,58,255,0.1);color:var(--indigo);}
  .navlinks button.active::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:60%;height:2px;background:var(--indigo);border-radius:2px;animation:underlineGrow .3s ease;}
  @keyframes underlineGrow{from{width:0;}to{width:60%;}}
  .page{padding:120px 32px 60px;max-width:1080px;margin:0 auto;}
  .glass{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(16px);box-shadow:0 4px 24px -8px rgba(46,31,76,0.06);transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s ease,border-color .3s ease;}
  .glass:hover{transform:translateY(-3px);box-shadow:0 14px 36px -10px rgba(74,58,255,0.18);}
  h1,h2,h3{font-weight:800;letter-spacing:-0.015em;color:var(--text-primary);}
  .btn-primary{background:linear-gradient(135deg,var(--indigo),#6A4FFF);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-weight:800;font-size:14.5px;padding:14px 26px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .3s ease;box-shadow:0 6px 18px -6px rgba(74,58,255,0.45);position:relative;overflow:hidden;}
  .btn-primary:hover{transform:translateY(-3px);box-shadow:0 14px 32px -8px rgba(74,58,255,0.55);}
  .btn-primary:active{transform:translateY(-1px) scale(0.96);}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}
  .btn-ghost{background:rgba(255,255,255,0.5);border:1.5px solid var(--border-strong);color:var(--text-primary);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:700;padding:11px 20px;cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);display:inline-flex;align-items:center;gap:8px;position:relative;overflow:hidden;}
  .btn-ghost:hover{background:#fff;border-color:var(--indigo);transform:translateY(-2px);}
  .btn-ghost:active{transform:translateY(0) scale(0.96);}
  .btn-google{background:#fff;color:#1f1f1f;border:1px solid rgba(46,31,76,0.12);border-radius:var(--radius-sm);font-family:var(--font);font-weight:700;font-size:14.5px;padding:14px 22px;cursor:pointer;display:inline-flex;align-items:center;gap:10px;width:100%;justify-content:center;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .3s ease;position:relative;overflow:hidden;}
  .btn-google:hover{transform:translateY(-3px);box-shadow:0 12px 26px -6px rgba(46,31,76,0.18);}
  .btn-google:active{transform:translateY(-1px) scale(0.97);}
  input[type=text],textarea{width:100%;background:rgba(255,255,255,0.65);border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:14.5px;padding:14px 16px;outline:none;transition:all .25s ease;}
  input:focus,textarea:focus{border-color:var(--indigo);box-shadow:0 0 0 5px rgba(74,58,255,0.12);background:#fff;transform:scale(1.005);}
  textarea{resize:vertical;min-height:84px;}
  .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.55);transform:scale(0);animation:rippleAnim .55s ease-out;pointer-events:none;}
  :root[data-theme="dark"] .ripple{background:rgba(255,255,255,0.25);}
  @keyframes rippleAnim{to{transform:scale(2.6);opacity:0;}}
  .chip-select{display:flex;align-items:center;gap:10px;padding:15px 16px;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);background:rgba(255,255,255,0.45);cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);font-size:14px;color:var(--text-secondary);font-weight:600;}
  .chip-select:hover{background:#fff;transform:translateY(-2px);}
  .chip-select:active{transform:scale(0.97);}
  .chip-select.sel{border-color:var(--indigo);background:rgba(74,58,255,0.08);color:var(--indigo-deep);font-weight:800;animation:chipPop .35s cubic-bezier(.34,1.56,.64,1);}
  @keyframes chipPop{0%{transform:scale(0.94);}60%{transform:scale(1.03);}100%{transform:scale(1);}}
  .pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1.8s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(242,169,59,.5)}70%{box-shadow:0 0 0 9px rgba(242,169,59,0)}100%{box-shadow:0 0 0 0 rgba(242,169,59,0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes popIn{0%{opacity:0;transform:scale(0.85) translateY(8px);}60%{opacity:1;transform:scale(1.02);}100%{transform:scale(1) translateY(0);}}
  @keyframes checkPop{0%{transform:scale(0);}60%{transform:scale(1.3);}100%{transform:scale(1);}}
  @keyframes burstOut{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0;}}
  @keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .fade-up{animation:fadeup .45s cubic-bezier(.16,1,.3,1);}
  #sos-btn{position:fixed;bottom:24px;right:24px;z-index:60;background:linear-gradient(135deg,var(--coral),#E8503D);color:#fff;border:none;border-radius:50px;padding:15px 22px;font-family:var(--font);font-weight:800;font-size:14px;display:flex;align-items:center;gap:9px;cursor:pointer;box-shadow:0 10px 28px -6px rgba(255,111,89,0.55);}
  #theme-toggle{background:var(--surface);border:1.5px solid var(--border-strong);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:transform .25s ease,background .25s ease;flex-shrink:0;}
  #theme-toggle:hover{transform:scale(1.08) rotate(15deg);}
  .staff-badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--indigo),var(--indigo-deep));padding:2px 9px;border-radius:10px;margin-bottom:4px;}
  .staff-entry{border-left:3px solid var(--gold);padding-left:10px;margin-left:-13px;}

  .btn-rainbow{
    position:relative;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-weight:800;
    font-size:14.5px;padding:14px 26px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;color:#fff;
    background:linear-gradient(270deg,#4A3AFF,#FF6F59,#F2A93B,#3DDC97,#5B8DEF,#4A3AFF);
    background-size:300% 300%;animation:rainbowShift 4s ease infinite, rainbowPulse 1.8s ease-in-out infinite;
    box-shadow:0 8px 22px -6px rgba(74,58,255,0.5);
  }
  @keyframes rainbowShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
  @keyframes rainbowPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.035);}}
  .btn-rainbow:hover{box-shadow:0 12px 30px -6px rgba(74,58,255,0.65);}

  .onboard-step{
    display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:13px;
    background:var(--surface);border:1px solid var(--border);transition:all .25s ease;
  }
  .onboard-num{
    width:26px;height:26px;border-radius:50%;background:var(--indigo);color:#fff;font-size:12.5px;font-weight:800;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  ::-webkit-scrollbar{width:10px;}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px;}
  @media (max-width:760px){.navlinks{display:none;}.page{padding:104px 18px 50px;}}
</style>
</head>

<!-- =====================================================================
     ตั้งค่า Supabase ตรงนี้ (ใส่ค่า 2 อย่างจากหน้า Settings > API ของ Supabase)
     ถ้าปล่อยว่างไว้ ระบบจะทำงานแบบ local เก็บข้อมูลในเครื่องแทน (ใช้ทดสอบได้)
     ===================================================================== -->
<script>
  window.SUPABASE_URL = "https://ssjngqwsibvaeumomwgi.supabase.co";
  window.SUPABASE_ANON_KEY = "sb_publishable_JCU8lrENCv7oWLd63v5wMA_RTPT3DHA";
</script>

<script type="text/app" id="appcode">
const { useState, useEffect, useRef } = React;

const USE_SUPABASE = !!(window.SUPABASE_URL && window.SUPABASE_ANON_KEY && window.supabase);
let sb = null;
let currentUser = null;
if (USE_SUPABASE) {
  try { sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY); }
  catch (e) { console.error("Supabase init failed:", e); }
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function nowISO(){ return new Date().toISOString(); }

const LOCAL_KEY = "pordaiyat_local_v1";
function localGet(){ try{ return JSON.parse(localStorage.getItem(LOCAL_KEY) || "null"); }catch(e){ return null; } }
function localSet(v){ try{ localStorage.setItem(LOCAL_KEY, JSON.stringify(v)); }catch(e){} }

/* ===== ฐานข้อมูล: เคส / ไทม์ไลน์ / เอกสาร / การจองคิว ===== */
const db = {
  async listCases(){
    if (sb && currentUser){
      const { data, error } = await sb.from("cases").select("*").eq("user_id", currentUser.id).order("created_at",{ascending:false});
      if (error) { console.error(error); return []; }
      return data || [];
    }
    const local = localGet();
    return (local && local.cases) || [];
  },
  async insertCase(c){
    const row = { ...c, id: uid(), created_at: nowISO() };
    if (sb && currentUser){
      row.user_id = currentUser.id;
      const { data, error } = await sb.from("cases").insert(row).select().single();
      if (error){ console.error(error); return row; }
      return data;
    }
    const local = localGet() || { cases:[], events:[], docs:[] };
    local.cases = [row, ...(local.cases||[])];
    localSet(local);
    return row;
  },
  async listEvents(caseId){
    if (sb && currentUser){
      const { data, error } = await sb.from("timeline_events").select("*").eq("case_id", caseId).eq("user_id", currentUser.id).order("event_time",{ascending:true});
      if (error){ console.error(error); return []; }
      return data || [];
    }
    const local = localGet();
    return ((local && local.events) || []).filter(e=>e.case_id===caseId);
  },
  async insertEvent(caseId, text, isStaff){
    const row = { id: uid(), case_id: caseId, event_text: text, event_time: nowISO(), is_staff: !!isStaff };
    if (sb && currentUser){
      row.user_id = currentUser.id;
      let { data, error } = await sb.from("timeline_events").insert(row).select().single();
      if (error){
        console.error("insertEvent error, retrying without is_staff column:", error);
        // เผื่อกรณียังไม่ได้รัน SQL เพิ่มคอลัมน์ is_staff ในฐานข้อมูล ลองบันทึกใหม่แบบไม่มีฟิลด์นี้
        const fallbackRow = { id: row.id, case_id: row.case_id, event_text: row.event_text, event_time: row.event_time, user_id: row.user_id };
        const retry = await sb.from("timeline_events").insert(fallbackRow).select().single();
        if (retry.error){ console.error("insertEvent fallback also failed:", retry.error); return row; }
        return retry.data;
      }
      return data;
    }
    const local = localGet() || { cases:[], events:[], docs:[] };
    local.events = [...(local.events||[]), row];
    localSet(local);
    return row;
  },
  async listDocs(){
    if (sb && currentUser){
      const { data, error } = await sb.from("documents").select("*").eq("user_id", currentUser.id).order("created_at",{ascending:false});
      if (error){ console.error(error); return []; }
      return data || [];
    }
    const local = localGet();
    return (local && local.docs) || [];
  },
  async insertDoc(file){
    const row = { id: uid(), file_name: file.name, file_size: file.size, created_at: nowISO() };
    if (sb && currentUser){
      row.user_id = currentUser.id;
      const path = currentUser.id + "/" + Date.now() + "-" + file.name;
      const { error: upErr } = await sb.storage.from("documents").upload(path, file);
      if (!upErr) row.storage_path = path;
      const { data, error } = await sb.from("documents").insert(row).select().single();
      if (error){ console.error(error); return row; }
      return data;
    }
    const local = localGet() || { cases:[], events:[], docs:[] };
    local.docs = [row, ...(local.docs||[])];
    localSet(local);
    return row;
  },
  async insertBooking(b){
    const row = { ...b, id: uid(), created_at: nowISO() };
    if (sb){
      row.user_id = currentUser ? currentUser.id : null;
      const { data, error } = await sb.from("bookings").insert(row).select().single();
      if (error){ console.error(error); return row; }
      return data;
    }
    const local = localGet() || { cases:[], events:[], docs:[], bookings:[] };
    local.bookings = [row, ...(local.bookings||[])];
    localSet(local);
    return row;
  },
  async checkIsStaff(){
    // เช็คว่าอีเมลของผู้ใช้ที่ login อยู่นี้ อยู่ในลิสต์เจ้าหน้าที่ของ Supabase หรือไม่
    // RLS ของตาราง staff_members จะอนุญาตให้เห็นแค่แถวของอีเมลตัวเองเท่านั้น
    if (!sb || !currentUser || !currentUser.email) return false;
    try {
      const { data, error } = await sb.from("staff_members").select("email").eq("email", currentUser.email).maybeSingle();
      if (error) { console.error("checkIsStaff error:", error); return false; }
      return !!data;
    } catch(e){ return false; }
  },
  async listAllCases(){
    // ใช้สำหรับเจ้าหน้าที่เท่านั้น — RLS ฝั่ง Supabase จะอนุญาตให้ query นี้คืนผลทุกเคส
    // เฉพาะกรณีอีเมลที่ login อยู่เป็นเจ้าหน้าที่จริงตามตาราง staff_members เท่านั้น
    if (!sb) return [];
    const { data, error } = await sb.from("cases").select("*").order("created_at",{ascending:false});
    if (error){ console.error("listAllCases error:", error); return []; }
    return data || [];
  },
  async listEventsForAdmin(caseId){
    if (!sb) return [];
    const { data, error } = await sb.from("timeline_events").select("*").eq("case_id", caseId).order("event_time",{ascending:true});
    if (error){ console.error("listEventsForAdmin error:", error); return []; }
    return data || [];
  },
  async insertEventAsStaff(caseId, text, targetUserId){
    // สำหรับเจ้าหน้าที่โพสต์ลงเคสของ "คนอื่น" — ใส่ user_id เป็นของเจ้าของเคส (targetUserId)
    // ไม่ใช่ user_id ของเจ้าหน้าที่เอง เพื่อให้ความเป็นเจ้าของข้อมูลถูกต้อง
    const row = { id: uid(), case_id: caseId, event_text: text, event_time: nowISO(), is_staff: true, user_id: targetUserId };
    if (!sb) return row;
    let { data, error } = await sb.from("timeline_events").insert(row).select().single();
    if (error){
      console.error("insertEventAsStaff error, retrying without is_staff column:", error);
      const fallbackRow = { id: row.id, case_id: row.case_id, event_text: row.event_text, event_time: row.event_time, user_id: row.user_id };
      const retry = await sb.from("timeline_events").insert(fallbackRow).select().single();
      if (retry.error){ console.error("insertEventAsStaff fallback also failed:", retry.error); return row; }
      return retry.data;
    }
    return data;
  }
};

/* ===== โปรไฟล์วิเคราะห์เคสแต่ละประเภท ===== */
const PROFILES = {

    steps:["ติดต่อธนาคารเพื่อสอบถามสาเหตุการอายัด","ขอหนังสือแจ้งอายัดอย่างเป็นทางการ","เตรียมเอกสารยืนยันตัวตนและหลักฐานธุรกรรม"]},
  "ถูกระงับสงสัยม้า": { pct:84, label:"เร่งด่วนมาก", color:"#E24B4A",
    desc:"กรณีนี้มีความซับซ้อนสูง ควรดำเนินการโดยเร็วที่สุดเพื่อป้องกันผลกระทบต่อประวัติทางการเงิน",
    steps:["ติดต่อธนาคารและขอเอกสารยืนยันสถานะบัญชี","รวบรวมหลักฐานการใช้บัญชีจริงทั้งหมด","พิจารณาปรึกษาผู้เชี่ยวชาญหากเอกสารไม่เพียงพอ"]},

/* ===== ตัวเลขนับขึ้นแบบมีแอนิเมชัน ใช้กับ % ความเร่งด่วน และตัวเลขสถิติต่างๆ ===== */
function CountUp({ value, duration }){
  const [display, setDisplay] = useState(0);
  useEffect(()=>{
    let start = null;
    const dur = duration || 900;
    const from = 0, to = value || 0;
    function step(ts){
      if (!start) start = ts;
      const progress = Math.min((ts - start) / dur, 1);
      const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
      setDisplay(Math.round(from + (to - from) * eased));
      if (progress < 1) requestAnimationFrame(step);
    }
    const raf = requestAnimationFrame(step);
    return ()=>{};
  }, [value]);
  return display;
}

const IMAGE_EXT = ["jpg","jpeg","png","gif","webp","bmp","heic","heif"];
function getFileExt(name){
  if(!name) return "";
  const parts = name.split(".");
  return parts.length > 1 ? parts[parts.length-1].toLowerCase() : "";
}

function DocThumbnail({ doc }){
  const [url, setUrl] = useState(null);
  const ext = getFileExt(doc.file_name);
  const isImage = IMAGE_EXT.includes(ext);

  useEffect(()=>{
    let active = true;
    (async ()=>{
      if (isImage && sb && doc.storage_path){
        try {
          const { data, error } = await sb.storage.from("documents").createSignedUrl(doc.storage_path, 3600);
          if (!error && data && active) setUrl(data.signedUrl);
        } catch(e){}
      }
    })();
    return ()=>{ active = false; };
  }, [doc.storage_path]);

  if (isImage && url){
    return React.createElement("img",{src:url, alt:doc.file_name, style:{width:"100%",height:84,objectFit:"cover",borderRadius:10,marginBottom:10,background:"var(--surface)"}});
  }
  const iconMap = { pdf:"ti-file-type-pdf", doc:"ti-file-type-doc", docx:"ti-file-type-doc" };
  const icon = isImage ? "ti-photo" : (iconMap[ext] || "ti-file");
  return React.createElement("div",{style:{width:"100%",height:84,borderRadius:10,marginBottom:10,background:"var(--surface)",display:"flex",alignItems:"center",justifyContent:"center"}},
    React.createElement("i",{className:"ti "+icon, style:{fontSize:32,color:"var(--text-muted)"}}));
}

function AdminPage(){
  const [allCases, setAllCases] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedCase, setSelectedCase] = useState(null);
  const [events, setEvents] = useState([]);
  const [staffText, setStaffText] = useState("");
  const [search, setSearch] = useState("");
  const [posting, setPosting] = useState(false);

  useEffect(()=>{
    (async ()=>{
      const cs = await db.listAllCases();
      setAllCases(cs);
      setLoading(false);
    })();
  }, []);

  const openCase = async (c) => {
    setSelectedCase(c);
    const evts = await db.listEventsForAdmin(c.id);
    setEvents(evts);
  };

  const postAsStaff = async () => {
    if (!staffText.trim() || !selectedCase) return;
    setPosting(true);
    const row = await db.insertEventAsStaff(selectedCase.id, staffText.trim(), selectedCase.user_id);
    setEvents(prev=>[...prev, row]);
    setStaffText("");
    setPosting(false);
  };

  const filtered = allCases.filter(c =>
    !search.trim() ||
    (c.event_type||"").includes(search) ||
    (c.detail||"").includes(search) ||
    (c.id||"").includes(search)
  );

  if (loading) return React.createElement("p",{style:{color:"var(--text-secondary)",fontSize:14}}, "กำลังโหลดรายชื่อเคสทั้งหมด...");

/* ===== App หลัก (หลัง login หรือโหมด local) ===== */
function App({ session }){
  const initialView = (new URLSearchParams(window.location.search).get("goto") === "dashboard") ? "dashboard" : "home";
  const [view, setView] = useState(initialView);
  const [cases, setCases] = useState([]);
  const [docs, setDocs] = useState([]);
  const [events, setEvents] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [isStaff, setIsStaff] = useState(false);

  const refreshCases = async () => { setCases(await db.listCases()); };
  const refreshDocs = async () => { setDocs(await db.listDocs()); };
  const activeCase = cases && cases.length ? cases[0] : null;
  const refreshEvents = async () => { if(activeCase) setEvents(await db.listEvents(activeCase.id)); };

  useEffect(()=>{
    (async ()=>{
      // กู้ข้อมูลฟอร์มที่เก็บไว้ก่อนไป login กับ Google (ถ้ามี) แล้วบันทึกเป็นเคสให้อัตโนมัติ
      if (USE_SUPABASE && session){
        let pending = null;
        try { pending = JSON.parse(localStorage.getItem("pordaiyat_pending_case") || "null"); } catch(e){}
        if (pending && pending.event_type){
          const p = PROFILES[pending.event_type];
          if (p){
            const newCase = await db.insertCase({ event_type:pending.event_type, event_date:pending.event_date, detail:pending.detail, urgency_pct:p.pct, urgency_label:p.label, status:"เปิดเคส" });
            if (newCase && newCase.id){
              await db.insertEvent(newCase.id, buildFirstEventText(pending.event_type, pending.event_date, pending.detail));
            }
          }
          try { localStorage.removeItem("pordaiyat_pending_case"); } catch(e){}
          // ล้าง query param ?goto=dashboard ออกจาก URL หลังใช้งานแล้ว ไม่ให้ค้างอยู่
          try { window.history.replaceState({}, "", window.location.pathname); } catch(e){}
        }
      }
      refreshCases();
      refreshDocs();
      const staffResult = await db.checkIsStaff();
      setIsStaff(staffResult);
    })();
  }, []);
  useEffect(()=>{ refreshEvents(); }, [activeCase && activeCase.id]);

  const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    const row = await db.insertDoc(file);
    setDocs(prev=>[row, ...prev]);
    setUploading(false);
  };
  const handleAddEvent = async (text, isStaffPost) => {
    const row = await db.insertEvent(activeCase.id, text, isStaffPost);
    setEvents(prev=>[...prev, row]);
  };

  return React.createElement(React.Fragment, null,
    React.createElement(TopNav, {view, setView, session, isStaff}),
    React.createElement("button",{id:"sos-btn", onClick:()=>setView("help")},
      React.createElement("i",{className:"ti ti-headset"}), "ขอความช่วยเหลือด่วน"),
    React.createElement("div",{className:"wrap"},
      React.createElement("div",{className:"page"},
        view==="home" && React.createElement(HomePage, {setView, session, refreshCases}),
        view==="dashboard" && React.createElement(DashboardPage, {session, cases, docs, events, setView}),
        view==="documents" && React.createElement(DocumentsPage, {docs, onUpload:handleUpload, uploading}),
        view==="timeline" && React.createElement(TimelinePage, {activeCase, events, onAdd:handleAddEvent}),
        view==="knowledge" && React.createElement(KnowledgePage, null),
        view==="help" && React.createElement(HelpPage, null),
        view==="admin" && isStaff && React.createElement(AdminPage, null)
      ))
  );
}

/* ===== Gate: เช็ค session ก่อน render (ถ้าต่อ Supabase ไว้) ===== */
function Gate(){
  const [ready, setReady] = useState(!USE_SUPABASE);
  const [session, setSession] = useState(null);
  useEffect(()=>{
    if (!USE_SUPABASE) return;
    sb.auth.getSession().then(({data})=>{
      currentUser = data.session ? data.session.user : null;
      setSession(data.session);
      setReady(true);
    });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s)=>{
      currentUser = s ? s.user : null;
      setSession(s);
    });
    return ()=>{ try{ sub.subscription.unsubscribe(); }catch(e){} };
  }, []);
  if (!ready) return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-secondary)"}}, "กำลังโหลด...");
  return React.createElement(App, {key: session && session.user ? session.user.id : "anon", session});
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Gate, null));
} catch (err) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#b91c1c">เกิดข้อผิดพลาดในการแสดงผล: ' + (err && err.message) + '</div>';
}
</script>

<script>
/* ===== ลูกเล่นแอนิเมชันเวลากดปุ่ม: ripple effect ทั่วทั้งเว็บ (อยู่นอก appcode เพื่อความชัดเจน) ===== */
document.addEventListener("click", function(e){
  var btn = e.target.closest("button, .chip-select, label.btn-primary, label.btn-ghost");
  if (!btn) return;
  var style = getComputedStyle(btn);
  if (style.position === "static") return; // ต้องมี position:relative ไว้รองรับ ripple อยู่แล้วในปุ่มหลัก
  var rect = btn.getBoundingClientRect();
  var ripple = document.createElement("span");
  var size = Math.max(rect.width, rect.height) * 1.2;
  ripple.className = "ripple";
  ripple.style.width = size + "px";
  ripple.style.height = size + "px";
  ripple.style.left = (e.clientX - rect.left - size/2) + "px";
  ripple.style.top = (e.clientY - rect.top - size/2) + "px";
  btn.appendChild(ripple);
  setTimeout(function(){ try{ ripple.remove(); }catch(err){} }, 600);
}, true);
</script>

<script>

(function(){
  function loadOne(urls, test, done){
    if(test()) return done();
    var i=0;
    (function go(){
      if(i>=urls.length) return done();
      var s=document.createElement('script');
      s.src=urls[i++];
      s.onload=function(){ test()?done():go(); };
      s.onerror=go;
      document.head.appendChild(s);
    })();
  }
  function chain(steps, fin){ var i=0; (function nx(){ if(i>=steps.length) return fin(); steps[i++](nx); })(); }
  var rootEl=document.getElementById('root');
  chain([
    function(n){ loadOne([
      'https://unpkg.com/react@18/umd/react.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
      'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'
    ], function(){return !!window.React;}, n); },
    function(n){ loadOne([
      'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
      'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'
    ], function(){return !!window.ReactDOM;}, n); },
    function(n){ loadOne([
      'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
      'https://unpkg.com/@supabase/supabase-js@2'
    ], function(){return !!window.supabase;}, n); }
  ], function(){
    if(!window.React || !window.ReactDOM){
      if(rootEl) rootEl.innerHTML='<div style="padding:40px;text-align:center;color:#b91c1c">โหลดไลบรารีหลักไม่สำเร็จ กรุณาเช็คอินเทอร์เน็ตแล้วรีเฟรช</div>';
      return;
    }
    try {
      var code=document.getElementById('appcode').textContent;
      (0, eval)(code);
    } catch(e){
      if(rootEl) rootEl.innerHTML='<div style="padding:40px;font-family:sans-serif;color:#b91c1c">เริ่มระบบไม่สำเร็จ: '+(e&&e.message)+'</div>';
    }
  });
})();
</script>
